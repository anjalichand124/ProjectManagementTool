<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Management Tool</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
            font-family:Arial, Helvetica, sans-serif;
        }

        .hero-card{
            max-width:760px;
            margin:40px auto;
            background:#ffffff;
            border-radius:20px;
            padding:50px;
            box-shadow:0 12px 30px rgba(0,0,0,0.10);
        }

        h1{
            font-size:48px;
            font-weight:700;
            color:#212529;
        }

        .subtitle{
            font-size:22px;
            color:#6c757d;
            margin-top:15px;
        }

        .feature{
            font-size:20px;
            margin:15px 0;
            color:#343a40;
        }

        .footer{
            margin-top:35px;
            color:#6c757d;
            font-size:16px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="hero-card text-center">

        <h1>
            🚀 Project Management Tool
        </h1>

        <p class="subtitle">
            Organize projects, manage tasks and track progress efficiently.
        </p>

        <hr class="my-4">

        <div class="feature">
            📁 Project Management
        </div>

        <div class="feature">
            ✅ Task Management
        </div>

        <div class="feature">
            📊 Task Board
        </div>

        <div class="feature">
            💬 Team Comments
        </div>

        <div class="mt-5">

            <p class="text-muted mb-4">
                Securely access your workspace to manage projects and tasks.
            </p>

            <a href="/login/" class="btn btn-primary btn-lg px-5">
                Login
            </a>

        </div>

        <div class="footer">

            <hr>

            <p>
                <strong>CodeAlpha Internship Project</strong><br>
                Django • Bootstrap • SQLite
            </p>

        </div>

    </div>

</div>

</html>
