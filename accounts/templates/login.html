<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Project Management Tool</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-card{
            width:430px;
            background:white;
            padding:40px;
            border-radius:18px;
            box-shadow:0 10px 30px rgba(0,0,0,0.12);
        }

        h2{
            text-align:center;
            font-weight:700;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#6c757d;
            margin-bottom:30px;
        }

        label{
            font-weight:600;
            margin-bottom:5px;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ced4da;
            border-radius:8px;
            margin-bottom:18px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            font-weight:600;
        }

        button:hover{
            background:#0b5ed7;
        }

        .home-link{
            text-align:center;
            margin-top:20px;
        }

        .home-link a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="login-card">

    <h2>🔐 Login</h2>

    <p>Project Management Tool</p>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Login
        </button>

    </form>

    <div class="home-link">

        <a href="/">
            ← Back to Home
        </a>

    </div>

</div>

</body>

</html>
